<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>District - Futuristic Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a0f 0%, #11111a 100%);
      font-family: 'Orbitron', sans-serif;
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      padding: 2rem 1rem;
      width: 100%;
      background: rgba(10, 25, 47, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(65, 105, 225, 0.3);
      margin-bottom: 2rem;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, 
        transparent, 
        #4169e1, 
        transparent
      );
    }

    h1 {
      font-size: 3rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #4169e1, #6495ed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(65, 105, 225, 0.5);
    }

    .subtitle {
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: #a0a0ff;
      opacity: 0.8;
    }

    .map-container {
      position: relative;
      width: 90%;
      max-width: 1200px;
      margin: 2rem auto;
      padding: 2rem;
      background: rgba(15, 20, 35, 0.6);
      border-radius: 12px;
      border: 1px solid rgba(65, 105, 225, 0.2);
      box-shadow: 
        0 0 40px rgba(65, 105, 225, 0.1),
        inset 0 0 40px rgba(65, 105, 225, 0.05);
    }

    /* Monochrome Royal Blue Color Scheme */
    .cls-1 { fill: #0a1a3a; stroke: #1a2a5a; }
    .cls-2 { fill: #0c1f42; stroke: #1c2f62; }
    .cls-3 { fill: #0e234a; stroke: #1e346a; }
    .cls-4 { fill: #102852; stroke: #203972; }
    .cls-5 { fill: #122c5a; stroke: #223e7a; }
    .cls-6 { fill: #143162; stroke: #244382; }
    .cls-7 { fill: #16356a; stroke: #26488a; }
    .cls-8 { fill: #183972; stroke: #284d92; }

    svg {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 0 20px rgba(65, 105, 225, 0.2));
      transition: filter 0.3s ease;
    }

    /* Futuristic glow effect */
    .zoom {
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      filter: brightness(1) saturate(1);
      transform-origin: center;
    }

    .zoom path {
      stroke-width: 0.5;
      stroke-linejoin: round;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Enhanced hover effect with glow */
    .zoom:hover {
      filter: brightness(1.3) saturate(1.2);
      transform: scale(1.02);
      z-index: 100;
    }

    .zoom:hover path {
      stroke: #6495ed;
      stroke-width: 2;
      filter: 
        drop-shadow(0 0 8px rgba(100, 149, 237, 0.8))
        drop-shadow(0 0 15px rgba(65, 105, 225, 0.6));
      fill: url(#hover-gradient);
    }

    /* Tooltip styling */
    .zoom {
      position: relative;
    }

    .zoom::after {
      content: attr(title);
      position: absolute;
      background: rgba(10, 25, 47, 0.95);
      color: #e0e0ff;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      white-space: nowrap;
      border: 1px solid rgba(100, 149, 237, 0.5);
      box-shadow: 
        0 0 20px rgba(65, 105, 225, 0.4),
        inset 0 0 10px rgba(100, 149, 237, 0.2);
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 1000;
    }

    .zoom:hover::after {
      opacity: 1;
      top: -50px;
    }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(10, 25, 47, 0.8);
      border-radius: 8px;
      border: 1px solid rgba(65, 105, 225, 0.3);
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .legend-item:hover {
      background: rgba(65, 105, 225, 0.1);
      transform: translateY(-2px);
    }

    .legend-color {
      width: 20px;
      height: 20px;
      border-radius: 3px;
      border: 1px solid rgba(100, 149, 237, 0.5);
    }

    .legend-text {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: #a0a0ff;
    }

    /* Footer */
    .footer {
      margin-top: 3rem;
      padding: 1.5rem;
      text-align: center;
      color: #708090;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      border-top: 1px solid rgba(65, 105, 225, 0.2);
      width: 100%;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(rgba(65, 105, 225, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(65, 105, 225, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
      opacity: 0.5;
    }

    /* Scan line effect */
    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(100, 149, 237, 0.8), 
        transparent
      );
      animation: scan 4s linear infinite;
      z-index: 999;
      pointer-events: none;
    }

    @keyframes scan {
      0% {
        top: 0;
      }
      100% {
        top: 100%;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
        letter-spacing: 0.1em;
      }
      
      .map-container {
        padding: 1rem;
      }
      
      .legend {
        gap: 1rem;
        padding: 1rem;
      }
      
      svg {
        margin-top: 0;
      }
    }
  </style>

    <script>
      // Add interactive effects
      document.addEventListener('DOMContentLoaded', function() {
        const districts = document.querySelectorAll('.zoom');
        
        districts.forEach(district => {
          // Add ripple effect on click
          district.addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const ripple = document.createElement('div');
            ripple.style.cssText = `
              position: absolute;
              width: 100px;
              height: 100px;
              background: radial-gradient(circle, rgba(100, 149, 237, 0.4) 0%, transparent 70%);
              border-radius: 50%;
              pointer-events: none;
              transform: translate(-50%, -50%);
              animation: ripple 0.6s ease-out;
              z-index: 1000;
            `;
            
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            
            this.appendChild(ripple);
            
            setTimeout(() => {
              ripple.remove();
            }, 600);
          });
        });
        
        // Add CSS for ripple animation
        const style = document.createElement('style');
        style.textContent = `
          @keyframes ripple {
            0% {
              transform: translate(-50%, -50%) scale(0);
              opacity: 1;
            }
            100% {
              transform: translate(-50%, -50%) scale(3);
              opacity: 0;
            }
          }
          
          /* Pulse animation for active district */
          @keyframes pulse {
            0%, 100% {
              filter: brightness(1.2) saturate(1.1);
            }
            50% {
              filter: brightness(1.4) saturate(1.2);
            }
          }
        `;
        document.head.appendChild(style);
      });
    </script>
